<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Similia Stock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="report.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
</head>

<body>
    <nav class="top-nav slide-down">
        <div class="nav-brand">
            <i class="fa-solid fa-leaf brand-icon"></i>
            <h2>Similia Stock</h2>
        </div>

        <div class="nav-menu">
            <a href="index.html" class="nav-link">
                <i class="fa-solid fa-chart-pie"></i> Dashboard
            </a>
            <a href="report.html" class="nav-link active">
                <i class="fa-solid fa-file-invoice"></i> Reports
            </a>
        </div>

        <div class="nav-right">
            <button id="themeToggle" class="theme-btn" title="Toggle Light/Dark Mode">
                <i class="fa-solid fa-sun"></i>
            </button>
            <div class="user-profile">
                <span class="user-name">Anike Hasan</span>
                <div class="avatar"><i class="fa-solid fa-user-tie"></i></div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="report-container">
            <div class="report-header-card">
                <h2><i class="fa-solid fa-calendar-days"></i> Monthly Summary Report</h2>

                <div class="report-controls">
                    <input type="date" id="startDate" class="form-input" title="Start Date">
                    <span style="color: var(--text-muted); font-weight: bold;">To</span>
                    <input type="date" id="endDate" class="form-input" title="End Date">
                    <button id="generateReportBtn" class="btn-glow"><i class="fa-solid fa-chart-line"></i>
                        Generate</button>
                </div>

            </div>

            <div class="report-cards">
                <div class="stat-card">
                    <div class="stat-icon-wrapper buy-icon"><i class="fa-solid fa-cart-arrow-down"></i></div>
                    <div class="stat-details">
                        <p>Total Purchased</p>
                        <h3 id="monthlyTotalBuy">0</h3>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon-wrapper sell-icon"><i class="fa-solid fa-tags"></i></div>
                    <div class="stat-details">
                        <p>Total Sold</p>
                        <h3 id="monthlyTotalSell">0</h3>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon-wrapper flow-icon"><i class="fa-solid fa-scale-balanced"></i></div>
                    <div class="stat-details">
                        <p>Net Flow</p>
                        <h3 id="monthlyNetFlow">0</h3>
                    </div>
                </div>
            </div>

            <!-- Invoice Section -->
            <div class="invoice-wrapper hidden" id="invoiceWrapper">
                <div class="invoice-actions">
                    <button id="downloadPdfBtn" class="btn-glow"><i class="fa-solid fa-file-pdf"></i> Download
                        PDF</button>
                </div>

                <div class="invoice-container" id="invoiceContainer">
                    <div class="invoice-header">
                        <div class="invoice-brand">
                            <h2><i class="fa-solid fa-leaf"></i> Similia Stock</h2>
                            <p>Similia Medicare</p>
                        </div>
                        <div class="invoice-meta">
                            <h3 id="invoiceMonthLabel">Monthly Summary: </h3>
                            <p>Generated by: <strong>Anike Hasan</strong></p>
                            <p id="invoiceDateGenerated">Date: </p>
                        </div>
                    </div>

                    <div class="invoice-body">
                        <table class="invoice-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>ID</th>
                                    <th>Product Name</th>
                                    <th>Type</th>
                                    <th>Qty</th>
                                </tr>
                            </thead>
                            <tbody id="invoiceTableBody"></tbody>
                        </table>
                    </div>

                    <div class="invoice-footer">
                        <div class="summary-box">
                            <p>Total Purchased: <strong id="invTotalBuy" class="text-buy">0</strong></p>
                            <p>Total Sold: <strong id="invTotalSell" class="text-sell">0</strong></p>
                            <hr>
                            <p>Net Flow: <strong id="invNetFlow">0</strong></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="report.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
